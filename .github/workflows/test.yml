name: Test

on:
  # develop is intentionally excluded here: it's always the head branch of
  # an open PR into main, so `pull_request` below already validates every
  # commit pushed there. Adding `develop` to push too would fire a second,
  # identically-named check run per commit — and a cancelled duplicate
  # blocks the PR's merge gate even when its sibling run succeeded.
  push:
    branches: [main]
  pull_request:

# Dedupe rapid consecutive pushes to the same PR (e.g. force-pushes) so only
# the latest commit's run completes.
concurrency:
  group: test-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  unit-integration:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run test:coverage

      # Runs even if the coverage step above failed the threshold check, so
      # the PR still shows what the actual numbers were, not just a red X.
      - name: Report coverage on the PR
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2

  e2e-firebase:
    name: End-to-end tests (Firebase emulators)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: npm ci --legacy-peer-deps
      - run: npm run test:firebase
