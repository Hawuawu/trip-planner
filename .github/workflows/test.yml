name: Test

on:
  # develop is intentionally excluded here: it's always the head branch of
  # an open PR into main, so `pull_request` below already validates every
  # commit pushed there. Adding `develop` to push too would fire a second,
  # identically-named check run per commit — and a cancelled duplicate
  # blocks the PR's merge gate even when its sibling run succeeded.
  push:
    branches: [main]
  pull_request:

# Dedupe rapid consecutive pushes to the same PR (e.g. force-pushes) so only
# the latest commit's run completes.
concurrency:
  group: test-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  unit-integration:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run test:coverage

      # Runs even if the coverage step above failed the threshold check, so
      # the PR still shows what the actual numbers were, not just a red X.
      - name: Report coverage on the PR
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2

      # Feeds GitHub's native code_coverage ruleset rule (separate from our
      # own threshold gate above and from the PR comment). fail-on-error is
      # false because this 404s until "Code Coverage" is enabled in repo
      # settings (Settings > Code security > Code Coverage) — a manual
      # toggle for this preview feature, not something this step can do.
      - name: Upload coverage for the code_coverage ruleset rule
        if: always()
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage/cobertura-coverage.xml
          language: JavaScript
          fail-on-error: false

  e2e-firebase:
    name: End-to-end tests (Firebase emulators)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: npm ci --legacy-peer-deps
      - run: npm run test:firebase
      - run: npm run test:functions

  security:
    name: Security scans (SAST + DAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npm run security:sast

      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run security:dast
