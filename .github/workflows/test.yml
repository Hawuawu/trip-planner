name: Test

on:
  push:
    branches: [main, develop]
  pull_request:

# A push to a branch with an open PR fires both `push` and the PR's
# `synchronize` event for the same commit. Group by commit SHA so the
# second trigger cancels the first instead of both running to completion.
concurrency:
  group: test-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  unit-integration:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run test:coverage

      # Runs even if the coverage step above failed the threshold check, so
      # the PR still shows what the actual numbers were, not just a red X.
      - name: Report coverage on the PR
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2

  e2e-firebase:
    name: End-to-end tests (Firebase emulators)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: npm ci --legacy-peer-deps
      - run: npm run test:firebase
