name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          # Firebase web SDK config is not secret — it identifies the project
          # to Firebase's backend, not an access credential. Security comes
          # from firestore.rules and Auth, not from hiding these values.
          VITE_FIREBASE_API_KEY: AIzaSyBpSfJhrslGv1gzpmsGaSJ_TEiBI-20kS8
          VITE_FIREBASE_AUTH_DOMAIN: maiyun-trip-planner.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: maiyun-trip-planner
          VITE_FIREBASE_STORAGE_BUCKET: maiyun-trip-planner.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '913386877235'
          VITE_FIREBASE_APP_ID: '1:913386877235:web:8378b282c0b47626454e46'

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - run: npx firebase-tools deploy --only hosting --project maiyun-trip-planner
