services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - path: .env
        required: false

  prod:
    build:
      context: .
      target: prod
    ports:
      - "8080:80"
    profiles:
      - prod
